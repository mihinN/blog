# CI checks for the static site at repo root.
# Runs three parallel jobs: HTML validation, link check, JavaScript lint.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  html-validate:
    name: Validate HTML
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install html-validate
        run: npm install --no-save html-validate@8

      - name: Validate all HTML files
        # Scans: index.html, whoami.html, projects.html,
        #        projects/the_9/the_9.html, projects/rabbitHole/rabbit_hole.html
        run: npx html-validate "**/*.html" --config .htmlvalidate.json

  link-check:
    name: Check for broken links
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Lychee link checker
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --no-progress
            --accept 200..=299,403,429
            --exclude-mail
            --exclude '^#$'
            './**/*.html'
          fail: true

  js-lint:
    name: Lint JavaScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install ESLint
        run: npm install --no-save eslint@9 globals@15

      - name: Lint js/*.js
        run: npx eslint "js/**/*.js" --no-error-on-unmatched-pattern
